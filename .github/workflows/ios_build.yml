name: Build iOS (Unsigned IPA)

on:
  push:
    branches:
      - main
  workflow_dispatch: # Cho phép trigger bằng tay từ giao diện GitHub

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Flutter dependencies
        run: flutter pub get

      # Quan trọng: pod install cài CocoaPods dependencies (flutter_midi_command cần CoreMIDI pod)
      # macOS runner đã có sẵn Ruby + CocoaPods
      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install --repo-update
          cd ..

      - name: Build iOS Application (Unsigned)
        # --no-codesign: Build không cần Apple Developer Account
        run: flutter build ios --release --no-codesign

      # Đóng gói .app thành .ipa (unsigned, sideload qua Sideloadly)
      - name: Package .ipa
        run: |
          cd build/ios/iphoneos
          mkdir Payload
          cp -r Runner.app Payload/
          zip -r app.ipa Payload
          rm -rf Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: midi-controller-ipa
          path: build/ios/iphoneos/app.ipa
          retention-days: 7
