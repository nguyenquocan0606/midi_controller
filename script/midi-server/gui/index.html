<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MIDI Controller Server</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header>
      <h1>MIDI Controller Server</h1>
      <div class="header-info">
        <span id="wsStatus" class="badge offline">Offline</span>
        <span id="clientCount" class="badge">0 clients</span>
      </div>
    </header>

    <main>
      <!-- Group Selector -->
      <section class="section">
        <h2>Groups</h2>
        <div id="layerList" class="layer-list"></div>
        <button id="btnAddLayer" class="btn btn-secondary">+ Add Group</button>
      </section>

      <!-- Pad Layout Selector -->
      <section class="section">
        <h2>Pad Grid Layout</h2>
        <div class="pad-layout-selector">
          <label><input type="radio" name="padLayout" value="grid5x3" checked> 5×3 (15 pads)</label>
          <label><input type="radio" name="padLayout" value="grid5x4"> 5×4 (20 pads)</label>
          <label><input type="radio" name="padLayout" value="grid5x5"> 5×5 (25 pads)</label>
        </div>
      </section>

      <!-- Channel Config -->
      <section class="section">
        <h2>Channel Names</h2>
        <div id="channelList" class="channel-list"></div>
      </section>

      <!-- Pad Config -->
      <section class="section">
        <h2>Pad Configuration</h2>
        <p class="hint">Click on a pad to edit. Paste image with Ctrl+V while editing.</p>
        <div id="padGrid" class="pad-grid"></div>
      </section>
    </main>

    <!-- Footer -->
    <footer>
      <span id="saveBadge" class="badge saved">✓ Saved</span>
      <button id="btnSave" class="btn btn-primary">Save Config</button>
      <span id="saveStatus" class="save-status"></span>
    </footer>
  </div>

  <!-- Pad Edit Modal -->
  <div id="padModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modalTitle">Edit Pad</h3>
        <button id="modalClose" class="btn-close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Name</label>
          <input type="text" id="padNameInput" placeholder="PAD 1" />
        </div>
        <div class="form-group">
          <label>Type</label>
          <select id="padTypeSelect">
            <option value="trigger">Trigger</option>
            <option value="toggle">Toggle</option>
          </select>
        </div>
        <div class="form-group">
          <label>Layer</label>
          <select id="padLayerSelect">
            <option value="0">Layer 1</option>
            <option value="1">Layer 2</option>
            <option value="2">Layer 3</option>
            <option value="3">Layer 4</option>
            <option value="4">Layer 5</option>
          </select>
          <small style="color:var(--text-dim);font-size:11px;">
            Trong cùng Layer chỉ có 1 pad sáng tại thời điểm
          </small>
        </div>
        <div class="form-group">
          <label>Color</label>
          <input type="color" id="padColorInput" value="#00D4FF" />
        </div>
        <div class="form-group">
          <label>Image</label>
          <div class="pad-image-area" id="padImageArea">
            <div class="pad-image-placeholder" id="padImagePlaceholder">
              <span>📷 Paste image</span>
              <small>Ctrl+V or drag & drop</small>
            </div>
            <img id="padImagePreview" class="hidden" />
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button id="btnRemoveImage" class="btn btn-danger hidden">Remove Image</button>
        <button id="btnSavePad" class="btn btn-primary">Save</button>
      </div>
    </div>
  </div>

  <!-- Group Edit Modal -->
  <div id="layerModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="layerModalTitle">Edit Group</h3>
        <button id="layerModalClose" class="btn-close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Layer Name</label>
          <input type="text" id="layerNameInput" placeholder="Layer 1" />
        </div>
      </div>
      <div class="modal-footer">
        <button id="btnDeleteLayer" class="btn btn-danger hidden">Delete Layer</button>
        <button id="btnSaveLayer" class="btn btn-primary">Save</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
